<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Associated Exhibition – Kam Shan Serial Robberies</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .exhibition-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
        }
        .title-zh {
            font-size: 26px;
            font-weight: 700;
            color: #ffffff;
            margin: 0 0 16px 0;
            letter-spacing: 1px;
            line-height: 1.4;
        }
        .title-en-sub {
            font-size: 16px;
            font-weight: 500;
            color: #1a73e8; /* 帥氣的動態藍色 */
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin: 0 0 6px 0;
        }
        .title-en-main {
            font-size: 18px;
            font-weight: 600;
            color: #e8eaed;
            margin: 0 0 24px 0;
            line-height: 1.4;
        }
        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            margin: 24px 0;
        }
        .info-item {
            font-size: 15px;
            color: #9aa0a6;
            margin: 10px 0;
            font-weight: 400;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        .info-highlight {
            color: #ffffff;
            font-weight: 500;
        }
        .location-brand {
            font-size: 16px;
            color: #ffffff;
            font-weight: 600;
            margin-top: 20px;
            letter-spacing: 0.5px;
        }
        .address {
            font-size: 13px;
            color: #80868b;
            margin-top: 4px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div class="exhibition-card">
    <!-- 中文主標題 -->
    <h1 class="title-zh">《馬騮山連環搶劫案》<br>藝術家改裝聯合創作展</h1>
    
    <!-- 英文展覽類別與副標題 -->
    <div class="title-en-sub">Associated Exhibition</div>
    <h2 class="title-en-main">Kam Shan Serial Robberies<br>Artist Soft Vinyl Modification Joint Exhibition</h2>
    
    <div class="divider"></div>
    
    <!-- 展期與時間 -->
    <div class="info-item">
        📅 <span class="info-highlight">11 Jul – 11 Aug 2026</span>
    </div>
    <div class="info-item">
        🕒 <span class="info-highlight">12:00 – 21:00</span>
    </div>
    
    <div class="divider"></div>
    
    <!-- 展出地點與地址 -->
    <div class="location-brand">📍 AMAZ by Lokianno</div>
    <div class="address">
        Basement, 2–4 Kingston Street, Causeway Bay
    </div>
</div>

</body>
</html>
